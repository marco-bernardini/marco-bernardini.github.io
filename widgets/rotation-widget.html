<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        .matrix { font-family: monospace; }
        .arrow { fill: none; stroke-width: 3; }
        .arrowhead { fill: currentColor; }
    </style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-6xl mx-auto">
        <div class="grid gap-6 lg:grid-cols-3">
            <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm p-6">
                <h2 class="text-xl font-semibold mb-6">Rotation for a fixed positive definite covariance matrix Σ</h2>
                
                <div class="grid gap-4 sm:grid-cols-3 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Σ₁₁</label>
                        <input id="o11" type="text" value="1.00" class="w-full px-3 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Σ₁₂ = Σ₂₁</label>
                        <input id="o12" type="text" value="0.50" class="w-full px-3 py-2 border rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Σ₂₂</label>
                        <input id="o22" type="text" value="1.50" class="w-full px-3 py-2 border rounded-lg">
                    </div>
                </div>

                <div class="mb-6">
                    <div class="flex justify-between text-sm mb-2">
                        <span>Rotation angle θ</span>
                        <span id="theta-display">30°</span>
                    </div>
                    <input id="theta" type="range" min="-180" max="180" value="30" class="w-full">
                </div>

                <div class="mb-6">
                    <label class="flex items-center gap-3">
                        <input id="reflect" type="checkbox" class="w-4 h-4 hidden">
                        <!-- <span class="text-sm">Include reflection so that Q ∈ O(2) rather than only SO(2)</span> -->
                    </label>
                </div>

                <div id="alert" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
                    The entered matrix is not symmetric positive definite, so Cholesky fails. In 2D you need Σ₁₁ > 0 and det(Σ) > 0.
                </div>

                <div id="content" class="hidden">
                    <div class="grid grid-cols-2 gap-6 items-start w-full">
                        <!-- Left: plot -->
                        <div class="w-full min-w-0">
                            <div class="bg-white border rounded-2xl p-4 h-full flex flex-col">
                                <svg id="svg" viewBox="0 0 300 300" class="w-full h-auto max-w-[260px] mx-auto bg-white rounded-xl">
                                    <defs>
                                        <pattern id="smallGrid" width="20" height="20" patternUnits="userSpaceOnUse">
                                            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#e5e7eb" stroke-width="0.3" />
                                        </pattern>
                                    </defs>
                                    <rect x="0" y="0" width="300" height="300" fill="url(#smallGrid)" />
                                    <line x1="20" y1="150" x2="280" y2="150" stroke="black" stroke-width="1" />
                                    <line x1="150" y1="20" x2="150" y2="280" stroke="black" stroke-width="1" />
                                    <text x="284" y="144" font-size="12">x</text>
                                    <text x="156" y="18" font-size="12">y</text>
                                    <g id="arrows" transform="translate(-30,-30)"></g>
                                </svg>

                                <div class="mt-4 grid gap-2 text-sm sm:grid-cols-2">
                                    <div class="flex items-center">
                                        <div class="w-3 h-3 bg-blue-600 rounded-full mr-2"></div>
                                        <span>Columns of Ω</span>
                                    </div>
                                    <div class="flex items-center">
                                        <div class="w-3 h-3 bg-red-600 rounded-full mr-2"></div>
                                        <span>Columns of Ω' = ΩU</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Right: matrices -->
                        <div class="w-full min-w-0">
                            <div class="grid grid-cols-1 gap-2">
                                <div id="omega-matrix" class="matrix-display"></div>
                                <div id="u-matrix" class="matrix-display"></div>
                                <div id="p-matrix" class="matrix-display"></div>
                                <div id="b-matrix" class="matrix-display"></div>
                            </div>
                        </div>

                    </div>  

                    <div class="grid gap-4 sm:grid-cols-2 mt-6">
                        <div id="recovered-matrix" class="matrix-display"></div>
                        <!-- <div class="bg-white border rounded-2xl p-4 text-sm">
                            <div class="font-medium mb-2">Consistency check</div>
                            <div class="font-mono" id="residual"></div>
                        </div> -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function fmt(x, digits = 3) {
            if (!Number.isFinite(x)) return "NaN";
            const y = Math.abs(x) < 1e-12 ? 0 : x;
            return y.toFixed(digits);
        }

        function det2(m) {
            return m[0][0] * m[1][1] - m[0][1] * m[1][0];
        }

        function mul2(a, b) {
            return [
                [a[0][0] * b[0][0] + a[0][1] * b[1][0], a[0][0] * b[0][1] + a[0][1] * b[1][1]],
                [a[1][0] * b[0][0] + a[1][1] * b[1][0], a[1][0] * b[0][1] + a[1][1] * b[1][1]],
            ];
        }

        function transpose2(a) {
            return [
                [a[0][0], a[1][0]],
                [a[0][1], a[1][1]],
            ];
        }

        function sub2(a, b) {
            return [
                [a[0][0] - b[0][0], a[0][1] - b[0][1]],
                [a[1][0] - b[1][0], a[1][1] - b[1][1]],
            ];
        }

        function frob2(a) {
            return Math.sqrt(a[0][0] ** 2 + a[0][1] ** 2 + a[1][0] ** 2 + a[1][1] ** 2);
        }

        function cholesky2(omega) {
            const a = omega[0][0];
            const b = omega[0][1];
            const c = omega[1][1];

            if (a <= 0) return null;
            const l11 = Math.sqrt(a);
            const l21 = b / l11;
            const rem = c - l21 * l21;
            if (rem <= 0) return null;
            const l22 = Math.sqrt(rem);

            return [
                [l11, 0],
                [l21, l22],
            ];
        }

        function rotation(thetaDeg, reflect) {
            const t = (thetaDeg * Math.PI) / 180;
            const c = Math.cos(t);
            const s = Math.sin(t);
            const r = [
                [c, -s],
                [s, c],
            ];
            if (!reflect) return r;
            const f = [
                [1, 0],
                [0, -1],
            ];
            return mul2(r, f);
        }

        function renderMatrix(title, m, el) {
            el.innerHTML = `
                <div class="text-sm font-medium mb-2">${title}</div>
                <div class="font-mono text-sm bg-gray-100 p-3 rounded">
                    <div>[ ${fmt(m[0][0])}   ${fmt(m[0][1])} ]</div>
                    <div>[ ${fmt(m[1][0])}   ${fmt(m[1][1])} ]</div>
                </div>
            `;
        }

        function renderArrow(x, y, color, label, scale) {
            const sx = 180;
            const sy = 180;
            const ex = sx + x * scale;
            const ey = sy - y * scale;
            const dx = ex - sx;
            const dy = ey - sy;
            const len = Math.sqrt(dx * dx + dy * dy) || 1;
            const ux = dx / len;
            const uy = dy / len;
            const ah = 10;
            const aw = 6;
            const leftX = ex - ah * ux + aw * uy;
            const leftY = ey - ah * uy - aw * ux;
            const rightX = ex - ah * ux - aw * uy;
            const rightY = ey - ah * uy + aw * ux;

            return `
                <line x1="${sx}" y1="${sy}" x2="${ex}" y2="${ey}" stroke="${color}" stroke-width="3" />
                <polygon points="${ex},${ey} ${leftX},${leftY} ${rightX},${rightY}" fill="${color}" />
                <circle cx="${ex}" cy="${ey}" r="3" fill="${color}" />
                <text x="${ex + 8}" y="${ey - 8}" font-size="12" fill="${color}">${label}</text>
            `;
        }

        function update() {
            const o11 = parseFloat(document.getElementById('o11').value) || 0;
            const o12 = parseFloat(document.getElementById('o12').value) || 0;
            const o22 = parseFloat(document.getElementById('o22').value) || 0;
            const theta = parseFloat(document.getElementById('theta').value) || 0;
            // const reflect = document.getElementById('reflect').checked;

            document.getElementById('theta-display').textContent = theta.toFixed(0) + '°';

            const omega = [[o11, o12], [o12, o22]];
            const P = cholesky2(omega);
            const Q = rotation(theta, reflect);
            const B = P ? mul2(P, Q) : null;
            const recovered = B ? mul2(B, transpose2(B)) : null;
            const residual = recovered ? frob2(sub2(recovered, omega)) : NaN;
            const positiveDefinite = omega[0][0] > 0 && det2(omega) > 0;

            const alertEl = document.getElementById('alert');
            const contentEl = document.getElementById('content');

            if (!positiveDefinite || !P) {
                alertEl.classList.remove('hidden');
                contentEl.classList.add('hidden');
                return;
            } else {
                alertEl.classList.add('hidden');
                contentEl.classList.remove('hidden');
            }

            renderMatrix('Σ', omega, document.getElementById('omega-matrix'));
            renderMatrix('Q', Q, document.getElementById('u-matrix'));
            renderMatrix('Ω', P, document.getElementById('p-matrix'));
            renderMatrix('ΩQ', B, document.getElementById('b-matrix'));
            // renderMatrix('Σ\'', recovered, document.getElementById('recovered-matrix'));
            // document.getElementById('residual').textContent = `||BB' - Σ||_F = ${fmt(residual, 8)}`;

            const vectors = P && B ? {
                p1: [P[0][0], P[1][0]],
                p2: [P[0][1], P[1][1]],
                b1: [B[0][0], B[1][0]],
                b2: [B[0][1], B[1][1]],
            } : null;

            if (vectors) {
                const vals = [
                    ...vectors.p1, ...vectors.p2, ...vectors.b1, ...vectors.b2
                ].map(Math.abs);
                const maxCoord = Math.max(2, ...vals);
                const scale = 120 / maxCoord;

                const arrowsEl = document.getElementById('arrows');
                arrowsEl.innerHTML = `
                    ${renderArrow(vectors.p1[0], vectors.p1[1], '#2563eb', 'p₁', scale)}
                    ${renderArrow(vectors.p2[0], vectors.p2[1], '#1d4ed8', 'p₂', scale)}
                    ${renderArrow(vectors.b1[0], vectors.b1[1], '#dc2626', 'b₁', scale)}
                    ${renderArrow(vectors.b2[0], vectors.b2[1], '#b91c1c', 'b₂', scale)}
                `;
            }
        }

        document.getElementById('o11').addEventListener('input', update);
        document.getElementById('o12').addEventListener('input', update);
        document.getElementById('o22').addEventListener('input', update);
        document.getElementById('theta').addEventListener('input', update);
        // document.getElementById('reflect').addEventListener('change', update);

        update(); // Initial render
    </script>
</body>
</html>
